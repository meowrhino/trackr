<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACKR · Gestión y facturación para autónomos · Gratis y privado</title>
<meta name="description" content="TRACKR: app gratuita de facturación para autónomos. Controla proyectos, horas, gastos y modelo 303 y 130. Funciona sin cuenta en tu navegador; con sincronización cifrada de conocimiento cero, opcional, entre dispositivos.">
<meta name="keywords" content="autónomos, facturación, modelo 303, modelo 130, gratis, sin registro, gestión proyectos">
<!-- Open Graph -->
<meta property="og:title" content="TRACKR · Facturación para autónomos · Gratis">
<meta property="og:description" content="App gratuita de facturación y gestión para autónomos. Funciona sin cuenta, en tu navegador. Sincronización cifrada de conocimiento cero, opcional.">
<meta property="og:image" content="https://trackr.meowrhino.studio/og-image.png">
<meta property="og:url" content="https://trackr.meowrhino.studio">
<meta property="og:type" content="website">
<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TRACKR · Facturación para autónomos · Gratis">
<meta name="twitter:description" content="App gratuita de facturación y gestión para autónomos. Sin cuenta por defecto; sincronización cifrada opcional.">
<meta name="twitter:image" content="https://trackr.meowrhino.studio/og-image.png">
<link rel="canonical" href="https://trackr.meowrhino.studio/">
<link rel="icon" type="image/png" href="navicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- CSS (orden importa: variables primero, responsive último) -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/detail.css">
<link rel="stylesheet" href="css/info.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/config.css">
<link rel="stylesheet" href="css/gastos.css">
<link rel="stylesheet" href="css/guide.css">
<link rel="stylesheet" href="journey/journey.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ════════════════════════════════════════════
     APP
     ════════════════════════════════════════════ -->
<div id="A">

  <!-- Sidebar -->
  <nav class="sb">
    <div class="sb-logo"><span>TRACKR</span></div>
    <div class="sb-nav">
      <div class="ni on" data-v="info" onclick="App.go('info')"><span class="ic">⊚</span><span class="nt">Info</span></div>
      <div class="ni" data-v="dash" onclick="App.go('dash')"><span class="ic">▣</span><span class="nt">Proyectos</span></div>
      <div class="ni" data-v="cal" onclick="App.go('cal')"><span class="ic">▨</span><span class="nt">Calendario</span></div>
      <div class="ni" data-v="gas" onclick="App.go('gas')"><span class="ic">€</span><span class="nt">Dineros</span></div>
      <div class="ni" data-v="jrn" onclick="App.go('jrn')"><span class="ic">◫</span><span class="nt">Journey</span></div>
      <div class="sep"></div>
      <div class="ni" data-v="cfg" onclick="App.go('cfg')"><span class="ic">⚙&#xFE0E;</span><span class="nt">Configuración</span></div>
      <div class="ni" data-v="guide" onclick="App.go('guide')"><span class="ic">?</span><span class="nt">Guía</span></div>
      <div class="ni" onclick="App.exp()"><span class="ic">⤓</span><span class="nt">Exportar</span></div>
      <div class="ni" onclick="document.getElementById('impA').click()"><span class="ic">⤒</span><span class="nt">Importar</span></div>
      <input type="file" id="impA" class="fh" accept=".json" onchange="App.imp(event)">
      <div class="sep"></div>
      <div class="ni" id="navLogout" onclick="App.accModal()"><span class="ic">→</span><span class="nt">Iniciar sesión</span></div>
      <div id="syncStatus" class="sync-status" style="display:none"></div>
    </div>
    <div class="sb-foot">
      <a href="https://meowrhino.studio" target="_blank" rel="noopener"
         data-track="meowrhino-out"
         onclick="T.ev('outbound','click','meowrhino-out')"
         id="footMade"></a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="mc">

    <!-- Invitación a instalar la PWA (descartable; oculta si ya instalada) -->
    <div id="pwaBanner" class="pwa-banner" style="display:none"></div>

    <!-- ── Vista: Info (Dashboard) ── -->
    <div id="vInfo" class="vw on">
      <div id="infoStatus"></div>
      <div id="infoFinancial"></div>
      <div id="infoMain"></div>
    </div>

    <!-- ── Vista: Proyectos (ex-Dashboard) ── -->
    <div id="vDash" class="vw">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
        <h1 class="pt" style="margin:0">Proyectos</h1>
        <button class="bt bt-p" onclick="App.pModal()">+ Nuevo proyecto</button>
      </div>
      <div class="tb" id="dFilt"></div>
      <div class="als" id="dAl"></div>
      <div id="dPr"></div>
    </div>

    <!-- ── Vista: Detalle de proyecto ── -->
    <div id="vDet" class="vw"><div id="detC"></div></div>

    <!-- ── Vista: Calendario ── -->
    <div id="vCal" class="vw">
      <h1 class="pt">Calendario</h1>
      <div id="calC"></div>
    </div>

    <!-- ── Vista: Dinero ── -->
    <div id="vGas" class="vw">
      <h1 class="pt">Dineros</h1>
      <div id="dinFin"></div>
      <div id="dinIngresos"></div>
      <div id="dinGastos"></div>
      <div id="dinTrim"></div>
      <div id="dinRenta"></div>
    </div>

    <!-- ── Vista: Customer Journey ── -->
    <div id="vJrn" class="vw">
      <h1 class="pt">Journey</h1>
      <div id="jrnC"></div>
    </div>

    <!-- ── Vista: Configuración ── -->
    <div id="vCfg" class="vw">
      <h1 class="pt">Configuración</h1>
      <div id="cfgC"></div>
    </div>

    <!-- ── Vista: Guía ── -->
    <div id="vGuide" class="vw">
      <h1 class="pt" id="guideTitle">Guía</h1>
      <div id="guideC"></div>
    </div>

  </main>
</div>

<!-- Modal global -->
<div class="mo" id="mO"><div class="md" id="mC"></div></div>

<!-- Toast notifications -->
<div id="toasts" aria-live="polite" aria-atomic="false"></div>

<!-- JS (orden importa: dependencias primero, app core, luego módulos de vista) -->
<script src="js/themes.js"></script>
<script src="js/colors.js"></script>
<script src="js/utils.js"></script>
<script src="js/lang.js"></script>
<script src="js/store.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<script src="js/history.js"></script>
<script src="js/billing.js"></script>
<script src="js/tracking.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/facturas.js"></script>
<script src="js/toast.js"></script>
<script src="vendor/hash-wasm/argon2.umd.min.js" integrity="sha384-tP0Wy54CKmng7i9EoTlPySD0hBx6Octj0VS6MfwlnUu111MPa+JLm0CCbep6XJ1W"></script>
<script src="js/crypto-account.js"></script>
<script src="js/account.js"></script>
<script src="js/app.js"></script>
<script src="js/app.project.js"></script>
<script src="js/app.facturas-ui.js"></script>
<script src="js/app.info.js"></script>
<script src="js/app.dash.js"></script>
<script src="js/app.detail.js"></script>
<script src="js/app.calendar.js"></script>
<script src="js/app.config.js"></script>
<script src="js/app.guide.js"></script>
<script src="journey/journey.js"></script>
<script src="js/app.journey.js"></script>
<script src="js/app.gastos.js"></script>
<script src="js/app.gastos.modals.js"></script>
<script src="js/app.account-ui.js"></script>
<script src="js/pwa.js"></script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body>
</html>
