<!DOCTYPE html>
<!--
  OG image template — TRACKR (variant: V1 minimal)
  Render: 1200×630 PNG used as og:image / twitter:image
  Para regenerar:
    chrome --headless --window-size=1200,800 --screenshot=tall.png file://.../og-template.html
    python3 -c "from PIL import Image; Image.open('tall.png').crop((0,0,1200,630)).save('og-image.png')"
  (Chrome renderiza mal a 1200×630 exacto con fallback de fuentes; el truco
  es render a 1200×800 y recortar el top 630px.)
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{background:#0a0a0c;color:#f0f0f5;font-family:'Outfit',system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 110px}
.logo{font-family:'DM Mono',monospace;font-size:1.4rem;letter-spacing:.45em;color:#f0f0f5;margin-bottom:.4rem;font-weight:500}
.kicker{font-family:'DM Mono',monospace;font-size:.85rem;color:#7a8a85;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2.2rem}
h1{font-size:4.6rem;font-weight:600;line-height:1.02;letter-spacing:-.025em;margin-bottom:1rem}
h1 .green{color:#00c8a0}
.line{width:80px;height:2px;background:#00c8a0;margin:1.8rem 0 1.4rem}
.foot{display:flex;align-items:baseline;justify-content:space-between;font-family:'DM Mono',monospace}
.url{font-size:1.3rem;color:#f0f0f5;letter-spacing:.05em;font-weight:500}
.by{font-size:.85rem;color:rgba(240,240,245,.4)}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <div class="logo">T R A C K R</div>
  <div class="kicker">para autónomos · estimación directa</div>
  <h1>Facturación,<br>horas y modelo 303.<br><span class="green">Gratis. Sin cuenta.</span></h1>
  <div class="line"></div>
  <div class="foot">
    <span class="url">tr4ckr.com</span>
    <span class="by">by meowrhino.studio</span>
  </div>
</div>
</body>
</html>
