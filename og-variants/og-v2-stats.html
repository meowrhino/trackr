<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{background:#0a0a0c;color:#f0f0f5;font-family:'Outfit',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;position:relative}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 50% 50% at 25% 50%,rgba(0,200,160,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 85% 30%,rgba(80,130,200,.04) 0%,transparent 60%)}
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:70px 90px}
.top{display:flex;align-items:flex-start;justify-content:space-between}
.logo{font-family:'DM Mono',monospace;font-size:2rem;letter-spacing:.4em;color:#f0f0f5}
.pill{display:inline-block;padding:.4em 1em;border:1px solid rgba(0,200,160,.4);color:#00c8a0;border-radius:100px;font-size:.85rem;letter-spacing:.05em;background:rgba(0,200,160,.08)}
.center-block{display:flex;flex-direction:column;align-items:flex-start;gap:.5rem}
.claim{font-size:3rem;font-weight:600;line-height:1.1;letter-spacing:-.02em;max-width:760px}
.claim .green{color:#00c8a0}
.subclaim{font-size:1.1rem;color:rgba(240,240,245,.55);max-width:680px}
.stats{display:flex;gap:3.5rem;align-items:flex-end}
.stat{display:flex;flex-direction:column;align-items:flex-start}
.stat-num{font-family:'DM Mono',monospace;font-size:2.4rem;color:#00c8a0;line-height:1}
.stat-num.neutral{color:#f0f0f5}
.stat-num.warn{color:#e8a93a}
.stat-lbl{font-size:.78rem;color:rgba(240,240,245,.45);margin-top:.4rem;letter-spacing:.04em}
.foot-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;font-family:'DM Mono',monospace}
.url{font-size:1.2rem;color:#f0f0f5;letter-spacing:.05em}
.by{font-size:.78rem;color:rgba(240,240,245,.4);margin-top:.3rem}
@font-face{font-family:'DM Mono';font-style:normal;font-weight:500;src:url(/Users/manu/Documents/GitHub/trackr/og-fonts/aFTR7PB1QTsUX8KYvumzIYQ.ttf) format('truetype')}
@font-face{font-family:'Outfit';font-style:normal;font-weight:400;src:url(/Users/manu/Documents/GitHub/trackr/og-fonts/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC1C4E.ttf) format('truetype')}
@font-face{font-family:'Outfit';font-style:normal;font-weight:600;src:url(/Users/manu/Documents/GitHub/trackr/og-fonts/QGYyz_MVcBeNP4NjuGObqx1XmO1I4e6yC4E.ttf) format('truetype')}
</style>
</head>
<body>
<div class="bg-grad"></div>
<div class="wrap">
  <div class="top">
    <div class="logo">TRACKR</div>
    <div class="pill">Verifactu antes jul 2027</div>
  </div>
  <div class="center-block">
    <div class="claim">Para autónomos<br>que dicen <span class="green">no</span> al cloud.</div>
    <div class="subclaim">Proyectos, horas, facturas, 303 y 130. Todo en tu navegador.</div>
  </div>
  <div style="display:flex;align-items:flex-end;justify-content:space-between">
    <div class="stats">
      <div class="stat"><span class="stat-num">0€</span><span class="stat-lbl">para siempre</span></div>
      <div class="stat"><span class="stat-num neutral">0</span><span class="stat-lbl">cuentas</span></div>
      <div class="stat"><span class="stat-num warn">0</span><span class="stat-lbl">datos en la nube</span></div>
    </div>
    <div class="foot-right">
      <span class="url">tr4ckr.com</span>
      <span class="by">by meowrhino.studio</span>
    </div>
  </div>
</div>
</body>
</html>
